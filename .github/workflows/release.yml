# Builds Stash and publishes installers to a GitHub Release.
#
# Trigger: push a version tag, e.g.
#   git tag v0.1.0 && git push origin v0.1.0
#
# Each runner builds its own platform-specific Python sidecar (PyInstaller)
# before `tauri build`, because the sidecar can't be cross-compiled.
#
# Signing is optional: leave the *_CERTIFICATE secrets unset for an unsigned
# beta (macOS users right-click → Open). Set them to enable notarization.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - os: macos-13 # Intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          # To add Windows / Linux later, drop these in (the sidecar script is
          # already cross-platform) and add their Rust targets:
          # - { os: windows-latest, target: x86_64-pc-windows-msvc, args: "" }
          # - { os: ubuntu-22.04,  target: x86_64-unknown-linux-gnu, args: "" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Build Python backend sidecar
        working-directory: desktop
        shell: bash
        run: npm run build:backend

      - name: Build & publish app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- macOS signing + notarization (optional) ---
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "Stash ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
